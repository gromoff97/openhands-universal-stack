name: ${STACK_NAME:?Set STACK_NAME in .env}

services:
  # Build job: produces the custom OpenHands sandbox image with distill installed.
  runtime-build:
    build:
      context: .
      dockerfile_inline: |
        FROM ghcr.io/openhands/agent-server:1.12.0-python

        ARG DISTILL_MODEL=qwen3.5:2b
        ARG DISTILL_TIMEOUT_MS=90000
        ARG DISTILL_HOST=http://host.docker.internal:11435

        USER root

        RUN npm install -g @samuelfaj/distill@1.4.0

        USER openhands

        RUN HOME=/home/openhands distill config host "$$DISTILL_HOST" \
            && HOME=/home/openhands distill config model "$$DISTILL_MODEL" \
            && HOME=/home/openhands distill config thinking false \
            && HOME=/home/openhands distill config timeout-ms "$$DISTILL_TIMEOUT_MS"
      args:
        DISTILL_HOST: "http://host.docker.internal:${OLLAMA_HOST_PORT:?Set OLLAMA_HOST_PORT in .env}"
        DISTILL_MODEL: "${DISTILL_OLLAMA_MODEL:?Set DISTILL_OLLAMA_MODEL in .env}"
        DISTILL_TIMEOUT_MS: "${DISTILL_TIMEOUT_MS:?Set DISTILL_TIMEOUT_MS in .env}"
    image: ${STACK_NAME:?Set STACK_NAME in .env}-runtime:latest
    entrypoint: ["true"]

  # Long-lived services.
  chatmock:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.13-slim

        ARG CHATMOCK_COMMIT=baf312a02e54dd62ab74be485759da5ee9ccf226

        WORKDIR /src

        RUN apt-get update \
            && apt-get install -y --no-install-recommends git ca-certificates \
            && rm -rf /var/lib/apt/lists/*

        RUN git clone https://github.com/RayBytes/ChatMock.git . \
            && git checkout "$$CHATMOCK_COMMIT"

        RUN pip install --no-cache-dir . gunicorn

        WORKDIR /app
        COPY scripts/chatmock_proxy.py /app/chatmock_proxy.py

        ENV CHATGPT_LOCAL_HOME=/config
        ENV PYTHONUNBUFFERED=1

        VOLUME ["/config"]
    image: ${STACK_NAME:?Set STACK_NAME in .env}-chatmock:latest
    command:
      [
        "chatmock",
        "serve",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--debug-model",
        "${CHATMOCK_MODEL:?Set CHATMOCK_MODEL in .env}",
        "--reasoning-effort",
        "${CHATMOCK_REASONING_EFFORT:?Set CHATMOCK_REASONING_EFFORT in .env}",
        "--reasoning-summary",
        "${CHATMOCK_REASONING_SUMMARY:?Set CHATMOCK_REASONING_SUMMARY in .env}",
        "--verbose",
      ]
    environment:
      CHATMOCK_MODEL: ${CHATMOCK_MODEL:?Set CHATMOCK_MODEL in .env}
      CHATMOCK_REASONING_EFFORT: ${CHATMOCK_REASONING_EFFORT:?Set CHATMOCK_REASONING_EFFORT in .env}
      CHATMOCK_REASONING_SUMMARY: ${CHATMOCK_REASONING_SUMMARY:?Set CHATMOCK_REASONING_SUMMARY in .env}
      CHATMOCK_VERBOSE: "true"
    expose:
      - "8000"
    volumes:
      - chatmock-state:/config
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  chatmock-proxy:
    image: ${STACK_NAME:?Set STACK_NAME in .env}-chatmock:latest
    depends_on:
      chatmock:
        condition: service_healthy
    command:
      [
        "gunicorn",
        "--bind",
        "0.0.0.0:5000",
        "chatmock_proxy:app",
      ]
    environment:
      CHATMOCK_MODEL: ${CHATMOCK_MODEL:?Set CHATMOCK_MODEL in .env}
      CHATMOCK_REASONING_EFFORT: ${CHATMOCK_REASONING_EFFORT:?Set CHATMOCK_REASONING_EFFORT in .env}
      CHATMOCK_REASONING_SUMMARY: ${CHATMOCK_REASONING_SUMMARY:?Set CHATMOCK_REASONING_SUMMARY in .env}
      CHATMOCK_VERBOSE: "true"
      CHATMOCK_BACKEND_BASE: http://chatmock:8000
    ports:
      - "5000:5000"
    volumes:
      - chatmock-state:/config
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/v1/models', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_HOST_PORT:?Set OLLAMA_HOST_PORT in .env}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  memory-mcp:
    image: supercorp/supergateway:3.4.3
    environment:
      MEMORY_FILE_PATH: /data/memory.jsonl
    command: >
      --stdio "npx -y @modelcontextprotocol/server-memory@2026.1.26"
        --outputTransport streamableHttp
        --port 8000
        --streamableHttpPath /mcp
        --healthEndpoint /healthz
    volumes:
      - memory-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  context7-mcp:
    build:
      context: .
      dockerfile_inline: |
        FROM node:22-slim

        RUN npm install -g @upstash/context7-mcp@2.1.4

        ENTRYPOINT ["context7-mcp"]
        CMD ["--transport", "http", "--port", "3000"]
    image: ${STACK_NAME:?Set STACK_NAME in .env}-context7-mcp:latest
    environment:
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/mcp').then(r=>process.exit(r.status===405||r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # One-shot jobs.
  chatmock-login:
    image: ${STACK_NAME:?Set STACK_NAME in .env}-chatmock:latest
    profiles:
      - login
    volumes:
      - chatmock-state:/config
    ports:
      - "1455:1455"
    command: ["chatmock", "login"]
    stdin_open: true
    tty: true

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: ["pull", "${DISTILL_OLLAMA_MODEL:?Set DISTILL_OLLAMA_MODEL in .env}"]

  openhands:
    image: docker.openhands.dev/openhands/openhands:latest
    depends_on:
      runtime-build:
        condition: service_completed_successfully
      ollama-pull:
        condition: service_completed_successfully
      chatmock:
        condition: service_healthy
      chatmock-proxy:
        condition: service_healthy
      context7-mcp:
        condition: service_healthy
      memory-mcp:
        condition: service_healthy
    ports:
      - "${OPENHANDS_PORT:?Set OPENHANDS_PORT in .env}:3000"
    environment:
      AGENT_SERVER_IMAGE_REPOSITORY: ${STACK_NAME:?Set STACK_NAME in .env}-runtime
      AGENT_SERVER_IMAGE_TAG: latest
      OH_SECRET_KEY: ${OH_SECRET_KEY:?Set OH_SECRET_KEY in .env}
      OH_AGENT_SERVER_ENV: >-
        {"OH_ALLOW_CORS_ORIGINS_1":"http://localhost:${OPENHANDS_PORT:?Set OPENHANDS_PORT in .env}","OH_ALLOW_CORS_ORIGINS_2":"http://127.0.0.1:${OPENHANDS_PORT:?Set OPENHANDS_PORT in .env}"}
      OH_SANDBOX_HOST_PORT: ${OPENHANDS_PORT:?Set OPENHANDS_PORT in .env}
      OH_WEB_URL: http://host.docker.internal:${OPENHANDS_PORT:?Set OPENHANDS_PORT in .env}
      SANDBOX_HOST_PORT: ${OPENHANDS_PORT:?Set OPENHANDS_PORT in .env}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.openhands:/.openhands
    restart: unless-stopped

volumes:
  chatmock-state:
  ollama-data:
  memory-data:
