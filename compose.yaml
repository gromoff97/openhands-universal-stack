services:
  runtime-image:
    build:
      context: .
      dockerfile_inline: |
        FROM ghcr.io/openhands/agent-server:1.12.0-python

        ARG DISTILL_MODEL=qwen3.5:2b
        ARG DISTILL_TIMEOUT_MS=90000
        ARG DISTILL_HOST=http://host.docker.internal:11435

        USER root

        RUN npm install -g @samuelfaj/distill@1.4.0

        RUN mkdir -p /home/openhands/.config/distill \
            && printf '{\n  "host": "%s",\n  "model": "%s",\n  "thinking": false,\n  "timeoutMs": %s\n}\n' "${DISTILL_HOST}" "${DISTILL_MODEL}" "${DISTILL_TIMEOUT_MS}" > /home/openhands/.config/distill/config.json \
            && chown -R openhands:openhands /home/openhands/.config

        USER openhands
      args:
        DISTILL_HOST: "http://host.docker.internal:${OLLAMA_HOST_PORT}"
        DISTILL_MODEL: "${DISTILL_OLLAMA_MODEL}"
        DISTILL_TIMEOUT_MS: "${DISTILL_TIMEOUT_MS}"
    image: ${STACK_NAME}-runtime:latest
    entrypoint: ["true"]

  chatmock:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.13-slim

        ARG CHATMOCK_COMMIT=baf312a02e54dd62ab74be485759da5ee9ccf226

        WORKDIR /src

        RUN apt-get update \
            && apt-get install -y --no-install-recommends git ca-certificates \
            && rm -rf /var/lib/apt/lists/*

        RUN git clone https://github.com/RayBytes/ChatMock.git . \
            && git checkout "${CHATMOCK_COMMIT}" \
            && pip install --no-cache-dir .

        ENV CHATGPT_LOCAL_HOME=/config
        ENV PYTHONUNBUFFERED=1

        VOLUME ["/config"]

        ENTRYPOINT ["chatmock"]
        CMD ["serve", "--host", "0.0.0.0", "--port", "5000", "--debug-model", "gpt-5.1-codex-max", "--reasoning-effort", "low", "--reasoning-summary", "none"]
    image: ${STACK_NAME}-chatmock:latest
    environment:
      CHATGPT_LOCAL_HOME: /config
    volumes:
      - chatmock-state:/config
    restart: unless-stopped

  chatmock-login:
    image: ${STACK_NAME}-chatmock:latest
    profiles:
      - login
    environment:
      CHATGPT_LOCAL_HOME: /config
    volumes:
      - chatmock-state:/config
    ports:
      - "1455:1455"
    command: ["login"]
    stdin_open: true
    tty: true

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_HOST_PORT}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  ollama-setup:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/ollama"]
    command: ["pull", "${DISTILL_OLLAMA_MODEL}"]

  context7-mcp:
    image: node:22-slim
    environment:
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY:-}
    command: ["npx", "-y", "@upstash/context7-mcp@2.1.4", "--transport", "http", "--port", "3000"]
    restart: unless-stopped

  memory-mcp:
    image: node:22-slim
    environment:
      MEMORY_FILE_PATH: /data/memory.jsonl
    command:
      [
        "npx",
        "-y",
        "supergateway@3.4.3",
        "--stdio",
        "npx -y @modelcontextprotocol/server-memory@2026.1.26",
        "--outputTransport",
        "streamableHttp",
        "--port",
        "8000",
        "--streamableHttpPath",
        "/mcp",
        "--healthEndpoint",
        "/healthz",
      ]
    volumes:
      - memory-data:/data
    restart: unless-stopped

  openhands:
    image: docker.openhands.dev/openhands/openhands:latest
    depends_on:
      ollama-setup:
        condition: service_completed_successfully
      runtime-image:
        condition: service_completed_successfully
      chatmock:
        condition: service_started
      context7-mcp:
        condition: service_started
      memory-mcp:
        condition: service_started
    ports:
      - "${OPENHANDS_PORT}:3000"
    environment:
      SANDBOX_VOLUMES: "${PROJECT_ROOT}:/workspace/project:rw"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-state:/root/.openhands
    restart: unless-stopped

volumes:
  openhands-state:
    name: ${STACK_NAME}-openhands-state
  chatmock-state:
    name: ${STACK_NAME}-chatmock-state
  ollama-data:
    name: ${STACK_NAME}-ollama-data
  memory-data:
    name: ${STACK_NAME}-memory-data
