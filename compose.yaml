name: ${STACK_NAME}

services:
  runtime-image:
    build:
      context: .
      dockerfile_inline: |
        FROM ghcr.io/openhands/agent-server:1.12.0-python

        ARG DISTILL_MODEL=qwen3.5:2b
        ARG DISTILL_TIMEOUT_MS=90000
        ARG DISTILL_HOST=http://host.docker.internal:11435

        USER root

        RUN npm install -g @samuelfaj/distill@1.4.0

        USER openhands

        RUN HOME=/home/openhands distill config host "$$DISTILL_HOST" \
            && HOME=/home/openhands distill config model "$$DISTILL_MODEL" \
            && HOME=/home/openhands distill config thinking false \
            && HOME=/home/openhands distill config timeout-ms "$$DISTILL_TIMEOUT_MS"
      args:
        DISTILL_HOST: "http://host.docker.internal:${OLLAMA_HOST_PORT}"
        DISTILL_MODEL: "${DISTILL_OLLAMA_MODEL}"
        DISTILL_TIMEOUT_MS: "${DISTILL_TIMEOUT_MS}"
    image: ${STACK_NAME}-runtime:latest
    entrypoint: ["true"]

  chatmock:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.13-slim

        ARG CHATMOCK_COMMIT=baf312a02e54dd62ab74be485759da5ee9ccf226

        WORKDIR /src

        RUN apt-get update \
            && apt-get install -y --no-install-recommends git ca-certificates \
            && rm -rf /var/lib/apt/lists/*

        RUN git clone https://github.com/RayBytes/ChatMock.git . \
            && git checkout "$$CHATMOCK_COMMIT" \
            && pip install --no-cache-dir .

        ENV CHATGPT_LOCAL_HOME=/config
        ENV PYTHONUNBUFFERED=1

        VOLUME ["/config"]

        ENTRYPOINT ["chatmock"]
    image: ${STACK_NAME}-chatmock:latest
    command:
      [
        "serve",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
        "--debug-model",
        "${CHATMOCK_MODEL:-gpt-5.1-codex-max}",
        "--reasoning-effort",
        "${CHATMOCK_REASONING_EFFORT:-low}",
        "--reasoning-summary",
        "${CHATMOCK_REASONING_SUMMARY:-none}",
      ]
    volumes:
      - chatmock-state:/config
    restart: unless-stopped

  chatmock-login:
    image: ${STACK_NAME}-chatmock:latest
    profiles:
      - login
    volumes:
      - chatmock-state:/config
    ports:
      - "1455:1455"
    command: ["login"]
    stdin_open: true
    tty: true

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_HOST_PORT}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  ollama-setup:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: ["pull", "${DISTILL_OLLAMA_MODEL}"]

  memory-mcp:
    image: supercorp/supergateway:3.4.3
    environment:
      MEMORY_FILE_PATH: /data/memory.jsonl
    command:
      [
        "--stdio",
        "npx -y @modelcontextprotocol/server-memory@2026.1.26",
        "--outputTransport",
        "streamableHttp",
        "--port",
        "8000",
        "--streamableHttpPath",
        "/mcp",
        "--healthEndpoint",
        "/healthz",
      ]
    volumes:
      - memory-data:/data
    restart: unless-stopped

  context7-mcp:
    build:
      context: .
      dockerfile_inline: |
        FROM node:22-slim

        RUN npm install -g @upstash/context7-mcp@2.1.4

        ENTRYPOINT ["context7-mcp"]
        CMD ["--transport", "http", "--port", "3000"]
    image: ${STACK_NAME}-context7-mcp:latest
    environment:
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY:-}
    restart: unless-stopped

  openhands:
    image: docker.openhands.dev/openhands/openhands:latest
    depends_on:
      ollama-setup:
        condition: service_completed_successfully
      runtime-image:
        condition: service_completed_successfully
      chatmock:
        condition: service_started
      context7-mcp:
        condition: service_started
      memory-mcp:
        condition: service_started
    ports:
      - "${OPENHANDS_PORT}:3000"
    environment:
      AGENT_SERVER_IMAGE_REPOSITORY: ${STACK_NAME}-runtime
      AGENT_SERVER_IMAGE_TAG: latest
      SANDBOX_VOLUMES: "${PROJECT_ROOT}:/workspace:rw"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.openhands:/.openhands
    restart: unless-stopped

volumes:
  chatmock-state:
  ollama-data:
  memory-data:
