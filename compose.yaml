services:
  runtime-image:
    build:
      context: ./runtime
      args:
        DISTILL_HOST: "http://host.docker.internal:${OLLAMA_HOST_PORT}"
        DISTILL_MODEL: "${DISTILL_OLLAMA_MODEL}"
        DISTILL_TIMEOUT_MS: "${DISTILL_TIMEOUT_MS}"
    image: ${STACK_NAME}-runtime:latest
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - "true"
    restart: "no"

  openhands-init:
    image: python:3.13-slim
    depends_on:
      runtime-image:
        condition: service_completed_successfully
    environment:
      STACK_NAME: ${STACK_NAME}
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY:-}
    volumes:
      - openhands-state:/state
    entrypoint:
      - /bin/sh
      - -lc
    command: |
      mkdir -p /state
      python - <<'PY'
      import json
      import os
      from pathlib import Path

      state_dir = Path("/state")
      settings_path = state_dir / "settings.json"
      mcp_path = state_dir / "mcp.json"
      runtime_image = f"{os.environ.get('STACK_NAME', 'openhands-support')}-runtime:latest"
      context7_api_key = os.environ.get("CONTEXT7_API_KEY", "").strip()

      def load_json(path: Path) -> dict:
          if not path.exists():
              return {}
          try:
              return json.loads(path.read_text(encoding="utf-8"))
          except json.JSONDecodeError:
              return {}

      def write_json(path: Path, payload: dict) -> None:
          path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")

      settings = load_json(settings_path)
      settings.update(
          {
              "language": settings.get("language", "en"),
              "agent": "CodeActAgent",
              "confirmation_mode": False,
              "llm_model": "openai/gpt-5.1-codex-max",
              "llm_api_key": "chatmock",
              "llm_base_url": "http://chatmock:5000/v1",
              "enable_default_condenser": True,
              "enable_sound_notifications": False,
              "enable_proactive_conversation_starters": False,
              "enable_solvability_analysis": False,
              "user_consents_to_analytics": False,
              "sandbox_base_container_image": runtime_image,
              "sandbox_runtime_container_image": runtime_image,
              "search_api_key": None,
              "sandbox_api_key": None,
              "condenser_max_size": 240,
              "git_user_name": "openhands",
              "git_user_email": "openhands@all-hands.dev",
              "v1_enabled": True,
          }
      )

      shttp_servers = [
          {"url": "http://context7-mcp:3000/mcp", "api_key": None, "timeout": 60},
          {"url": "http://memory-mcp:8000/mcp", "api_key": None, "timeout": 60},
      ]
      if context7_api_key:
          shttp_servers[0]["api_key"] = context7_api_key

      settings["mcp_config"] = {
          "sse_servers": [],
          "stdio_servers": [],
          "shttp_servers": shttp_servers,
      }

      mcp_json = load_json(mcp_path)
      mcp_servers = mcp_json.get("mcpServers", {})
      mcp_servers["context7"] = {
          "transport": "http",
          "url": "http://context7-mcp:3000/mcp",
          "enabled": True,
      }
      if context7_api_key:
          mcp_servers["context7"]["headers"] = {"context7-api-key": context7_api_key}
      mcp_servers["memory"] = {
          "transport": "http",
          "url": "http://memory-mcp:8000/mcp",
          "enabled": True,
      }
      mcp_json["mcpServers"] = mcp_servers

      write_json(settings_path, settings)
      write_json(mcp_path, mcp_json)
      PY
    restart: "no"

  chatmock:
    build:
      context: ./chatmock
    image: ${STACK_NAME}-chatmock:latest
    container_name: ${STACK_NAME}-chatmock
    environment:
      CHATGPT_LOCAL_HOME: /config
    volumes:
      - chatmock-state:/config
    command:
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --debug-model
      - gpt-5.1-codex-max
      - --reasoning-effort
      - low
      - --reasoning-summary
      - none
    restart: unless-stopped

  chatmock-login:
    image: ${STACK_NAME}-chatmock:latest
    profiles:
      - login
    environment:
      CHATGPT_LOCAL_HOME: /config
    volumes:
      - chatmock-state:/config
    ports:
      - "1455:1455"
    command:
      - login
    stdin_open: true
    tty: true
    restart: "no"

  ollama:
    image: ollama/ollama:latest
    container_name: ${STACK_NAME}-ollama
    ports:
      - "${OLLAMA_HOST_PORT}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test:
        - CMD
        - ollama
        - list
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  ollama-setup:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      DISTILL_OLLAMA_MODEL: ${DISTILL_OLLAMA_MODEL}
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - ollama pull "${DISTILL_OLLAMA_MODEL}"
    restart: "no"

  context7-mcp:
    build:
      context: ./context7
    image: ${STACK_NAME}-context7-mcp:latest
    container_name: ${STACK_NAME}-context7-mcp
    environment:
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY:-}
    command:
      - --transport
      - http
      - --port
      - "3000"
    restart: unless-stopped

  memory-mcp:
    build:
      context: ./memory
    image: ${STACK_NAME}-memory-mcp:latest
    container_name: ${STACK_NAME}-memory-mcp
    environment:
      MEMORY_FILE_PATH: /data/memory.jsonl
    command:
      - supergateway
      - --stdio
      - mcp-server-memory
      - --outputTransport
      - streamableHttp
      - --port
      - "8000"
      - --streamableHttpPath
      - /mcp
      - --healthEndpoint
      - /healthz
    volumes:
      - memory-data:/data
    restart: unless-stopped

  openhands:
    image: docker.openhands.dev/openhands/openhands:latest
    container_name: ${STACK_NAME}-openhands
    depends_on:
      openhands-init:
        condition: service_completed_successfully
      ollama-setup:
        condition: service_completed_successfully
      chatmock:
        condition: service_started
      context7-mcp:
        condition: service_started
      memory-mcp:
        condition: service_started
    ports:
      - "${OPENHANDS_PORT}:3000"
    environment:
      SANDBOX_VOLUMES: "${PROJECT_ROOT}:/workspace/project:rw"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-state:/root/.openhands
    restart: unless-stopped

volumes:
  openhands-state:
    name: ${STACK_NAME}-openhands-state
  chatmock-state:
    name: ${STACK_NAME}-chatmock-state
  ollama-data:
    name: ${STACK_NAME}-ollama-data
  memory-data:
    name: ${STACK_NAME}-memory-data
